<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Runeterra Meta — LND</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,560;9..144,640&family=Inter:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0f17; --panel:#141b27; --panel2:#1a2230; --line:#27313f;
    --ink:#e9edf4; --muted:#94a1b5; --faint:#5f6c7e;
    --gold:#e3b25a; --teal:#49c7b1;
    --good:#46b88a; --bad:#e0575c; --mid:#586374;
    --r-DE:#e8c25a; --r-FR:#6fd0e8; --r-IO:#ef7fae; --r-NX:#e0524e; --r-PZ:#f0973f;
    --r-SI:#38c39a; --r-BW:#e06a3a; --r-SH:#d9b84a; --r-MT:#9b7fe0; --r-BC:#7fce5a; --r-RU:#9aa6b8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{background:
    radial-gradient(1100px 500px at 78% -10%, rgba(227,178,90,.07), transparent 60%),
    radial-gradient(900px 480px at 8% 0%, rgba(73,199,177,.06), transparent 55%), var(--bg);
    min-height:100vh}
  .wrap{max-width:1180px;margin:0 auto;padding:34px 22px 90px}

  .eyebrow{font:600 11px/1 "Spline Sans Mono",monospace;letter-spacing:.28em;
    text-transform:uppercase;color:var(--gold);margin-bottom:14px}
  h1{font-family:Fraunces,serif;font-weight:560;font-size:clamp(34px,6vw,58px);
    line-height:.98;margin:0;letter-spacing:-.01em}
  h1 em{font-style:italic;color:var(--teal)}
  .sub{margin:14px 0 0;color:var(--muted);font-size:14px;max-width:62ch}
  .meta{display:flex;flex-wrap:wrap;gap:10px 26px;margin-top:20px;
    font:500 12.5px/1 "Spline Sans Mono",monospace;color:var(--muted)}
  .meta b{color:var(--ink);font-weight:600}
  .meta .dot{color:var(--faint)}

  .controls{display:flex;flex-wrap:wrap;gap:22px;margin:30px 0 8px;
    padding:18px;background:var(--panel);border:1px solid var(--line);border-radius:14px}
  .ctl{display:flex;flex-direction:column;gap:8px}
  .ctl > span{font:600 10.5px/1 "Spline Sans Mono",monospace;letter-spacing:.16em;
    text-transform:uppercase;color:var(--faint)}
  .seg{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:3px}
  .seg button{appearance:none;border:0;background:transparent;color:var(--muted);
    font:500 13px/1 Inter,sans-serif;padding:8px 13px;border-radius:7px;cursor:pointer;
    transition:background .15s,color .15s}
  .seg button:hover{color:var(--ink)}
  .seg button[aria-pressed="true"]{background:var(--panel2);color:var(--ink);
    box-shadow:inset 0 0 0 1px var(--line)}
  .seg button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

  section{margin-top:42px}
  .head{display:flex;align-items:baseline;gap:14px;margin-bottom:16px;flex-wrap:wrap}
  .head h2{font-family:Fraunces,serif;font-weight:560;font-size:23px;margin:0;letter-spacing:-.01em}
  .head .note{font:500 12px/1.4 "Spline Sans Mono",monospace;color:var(--faint)}
  .head .spacer{flex:1}
  .linkbtn{appearance:none;border:1px solid var(--line);background:var(--panel);color:var(--muted);
    font:500 12px/1 "Spline Sans Mono",monospace;padding:8px 12px;border-radius:8px;cursor:pointer}
  .linkbtn:hover{color:var(--ink);border-color:var(--gold)}

  .chips{display:inline-flex;gap:4px;vertical-align:middle}
  .chip{display:inline-flex;align-items:center;justify-content:center;
    width:22px;height:16px;border-radius:4px;font:600 9px/1 "Spline Sans Mono",monospace;
    color:#0b0f17}

  /* meta table */
  .scroll{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:var(--panel)}
  table.list{width:100%;border-collapse:collapse;font-size:13.5px}
  table.list th{text-align:left;font:600 10.5px/1 "Spline Sans Mono",monospace;
    letter-spacing:.12em;text-transform:uppercase;color:var(--faint);padding:14px 12px;
    border-bottom:1px solid var(--line);white-space:nowrap}
  table.list th.num,table.list td.num{text-align:right;font-family:"Spline Sans Mono",monospace}
  table.list th.sortable{cursor:pointer;user-select:none}
  table.list th.sortable:hover{color:var(--muted)}
  table.list th.active{color:var(--gold)}
  table.list td{padding:11px 12px;border-bottom:1px solid rgba(39,49,63,.55)}
  table.list tbody tr{cursor:pointer}
  table.list tbody tr:hover{background:var(--panel2)}
  table.list tbody tr.sel{background:rgba(227,178,90,.08);box-shadow:inset 3px 0 0 var(--gold)}
  table.list .nm{display:flex;align-items:center;gap:10px;min-width:170px}
  .ci{font:500 11px/1 "Spline Sans Mono",monospace;color:var(--faint)}
  .pbar{height:3px;border-radius:2px;background:var(--line);margin-top:5px;overflow:hidden;width:90px}
  .pbar>i{display:block;height:100%;background:var(--teal)}

  /* matrix */
  table.mx{border-collapse:collapse;font:500 12px/1 "Spline Sans Mono",monospace}
  table.mx th,table.mx td{padding:0;text-align:center}
  table.mx thead th{position:sticky;top:0;background:var(--panel);color:var(--muted);
    font-weight:500;height:128px;vertical-align:bottom;z-index:1}
  table.mx thead th .v{writing-mode:vertical-rl;transform:rotate(180deg);
    padding:9px 0;max-height:116px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;cursor:pointer}
  table.mx thead th.lead{writing-mode:horizontal-tb;font-size:10px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--faint);height:128px;vertical-align:bottom;padding-bottom:11px}
  table.mx tbody th{text-align:left;white-space:nowrap;padding:0 12px 0 16px;color:var(--ink);
    font-weight:500;font-size:12px;background:var(--panel);cursor:pointer}
  table.mx tbody th:hover{color:var(--gold)}
  table.mx td{width:40px;height:38px;border-left:1px solid rgba(39,49,63,.5);
    border-top:1px solid rgba(39,49,63,.5);color:#0b0f17;font-weight:600}
  table.mx td.lead{background:var(--panel2);color:var(--ink);font-weight:500;width:52px}
  table.mx td.diag{background:repeating-linear-gradient(45deg,#1a2230,#1a2230 4px,#171e2a 4px,#171e2a 8px);color:var(--faint)}
  table.mx td.empty{color:var(--faint);background:var(--panel2)}
  table.mx td.low{opacity:.45}
  table.mx tbody tr:hover th{color:var(--gold)}
  .legend{display:flex;align-items:center;gap:8px;margin-top:14px;
    font:500 11px/1 "Spline Sans Mono",monospace;color:var(--faint)}
  .legend .scale{display:flex;height:9px;width:150px;border-radius:5px;overflow:hidden}
  .legend .scale i{flex:1}

  /* deck detail */
  .detail{border:1px solid var(--gold);border-radius:16px;background:var(--panel);
    padding:22px;margin-top:8px;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .detail .dhead{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
  .detail .dtitle{font-family:Fraunces,serif;font-weight:560;font-size:22px;display:flex;align-items:center;gap:10px}
  .detail .close{margin-left:auto;appearance:none;border:1px solid var(--line);background:transparent;
    color:var(--muted);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px}
  .detail .close:hover{color:var(--ink);border-color:var(--gold)}
  .detail .stat{display:flex;gap:24px;margin:14px 0 4px;flex-wrap:wrap;
    font:500 13px/1.3 "Spline Sans Mono",monospace}
  .detail .stat b{display:block;font-family:Fraunces,serif;font-size:20px;font-weight:640;margin-top:3px}
  .detail .stat .k{color:var(--faint);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase}
  .mlist{margin-top:18px;border-top:1px solid var(--line)}
  .mrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(39,49,63,.5)}
  .mrow .opp{flex:1;display:flex;align-items:center;gap:9px;min-width:0;font-size:13.5px}
  .mrow .opp span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mrow .rec{font:500 12px/1 "Spline Sans Mono",monospace;color:var(--muted);width:54px;text-align:right}
  .mrow .wrcell{font:600 13px/1 "Spline Sans Mono",monospace;width:44px;text-align:right}
  .mrow .ci{width:90px;text-align:right}
  .empty-state{padding:46px 22px;text-align:center;color:var(--muted);
    background:var(--panel);border:1px solid var(--line);border-radius:14px}
  .empty-state b{color:var(--ink);display:block;margin-bottom:6px;font-size:15px}
  footer{margin-top:60px;padding-top:22px;border-top:1px solid var(--line);
    color:var(--faint);font:500 12px/1.7 "Spline Sans Mono",monospace}
  footer b{color:var(--muted)}
  @media (max-width:560px){.controls{gap:16px}.mrow .ci{display:none}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">LND · Storyteller Project</div>
  <h1>Runeterra <em>Meta</em></h1>
  <p class="sub">Live ranked deck statistics, crawled from the Riot API and grouped by champion archetype. Win rates show a 95% confidence interval — the smaller the sample, the wider the range.</p>
  <div class="meta" id="meta"></div>

  <div class="controls">
    <div class="ctl"><span>Region</span><div class="seg" id="seg-region"></div></div>
    <div class="ctl"><span>Format</span><div class="seg" id="seg-format"></div></div>
    <div class="ctl"><span>Window</span><div class="seg" id="seg-window"></div></div>
  </div>

  <div id="content"></div>
  <footer id="foot"></footer>
</div>

<script>
const REGION_LABEL = { europe:'EU', americas:'NA', asia:'APAC' };
const REGION_NAME = { DE:'Demacia',FR:'Freljord',IO:'Ionia',NX:'Noxus',PZ:'Piltover & Zaun',
  SI:'Shadow Isles',BW:'Bilgewater',SH:'Shurima',MT:'Mount Targon',BC:'Bandle City',RU:'Runeterra' };
const FACTION_REF = {FACTION_DEMACIA_NAME:'DE',FACTION_FRELJORD_NAME:'FR',FACTION_IONIA_NAME:'IO',
  FACTION_NOXUS_NAME:'NX',FACTION_PILTOVER_NAME:'PZ',FACTION_SHADOWISLES_NAME:'SI',
  FACTION_BILGEWATER_NAME:'BW',FACTION_SHURIMA_NAME:'SH',FACTION_MTTARGON_NAME:'MT',FACTION_BANDLECITY_NAME:'BC'};
const regionCode = f => FACTION_REF[f] || (/^[A-Z]{2}$/.test(f) ? f : 'RU');

function normalizeLabel(label){
  const m = String(label).match(/^(.*?)\s*\(([^)]*)\)\s*$/);
  if(!m) return label;
  const regions = [...new Set(m[2].split('/').map(s=>regionCode(s.trim())))].sort();
  return `${m[1].trim()} (${regions.join('/')})`;
}
function regionsOf(label){ const m=String(label).match(/\(([^)]*)\)\s*$/); return m?m[1].split('/'):[]; }
function deckName(label){ return label.replace(/\s*\([^)]*\)\s*$/,''); }
function chips(label){
  return `<span class="chips">`+regionsOf(label).map(r=>
    `<span class="chip" style="background:var(--r-${r},#9aa6b8)" title="${REGION_NAME[r]||r}">${r}</span>`).join('')+`</span>`;
}
// Wilson 95% interval
function wilson(w,n){ if(!n) return [0,0]; const z=1.96,p=w/n,d=1+z*z/n,c=p+z*z/(2*n),
  m=z*Math.sqrt(p*(1-p)/n+z*z/(4*n*n)); return [(c-m)/d,(c+m)/d]; }
function wrColor(wr){
  if(wr==null) return 'var(--mid)';
  const t=Math.max(0,Math.min(1,(wr-0.35)/0.30)), bad=[224,87,92], good=[70,184,138];
  const c=bad.map((b,i)=>Math.round(b+(good[i]-b)*t)); return `rgb(${c[0]},${c[1]},${c[2]})`;
}

const MIN_GAMES = 3;       // práh pro matici
const META_MIN = 0.01;     // WRmeta: jen soupeři s >=1% playrate
const state = { region:'all', format:'all', window:14, sort:'play', selected:null };
let STATS = null;
const todayKey = () => new Date().toISOString().slice(0,10);

function aggregate(){
  const days = STATS.days || {};
  const cutoff = state.window
    ? new Date(Date.now()-(state.window-1)*864e5).toISOString().slice(0,10)
    : STATS.patchStart;
  const today = todayKey();
  const deck = {}, mu = {};
  for(const [d, regs] of Object.entries(days)){
    if(d < cutoff || d > today) continue;
    for(const [reg, fmts] of Object.entries(regs)){
      if(state.region !== 'all' && reg !== state.region) continue;
      for(const [fmt, b] of Object.entries(fmts)){
        if(state.format !== 'all' && fmt !== state.format) continue;
        for(const [k,v] of Object.entries(b.deckGames||{})){
          const n=normalizeLabel(k); (deck[n]??={games:0,wins:0}); deck[n].games+=v.games; deck[n].wins+=v.wins;
        }
        for(const [k,v] of Object.entries(b.matchups||{})){
          const i=k.indexOf('@@'); if(i<0) continue;
          const nk=normalizeLabel(k.slice(0,i))+'@@'+normalizeLabel(k.slice(i+2));
          (mu[nk]??={games:0,wins:0}); mu[nk].games+=v.games; mu[nk].wins+=v.wins;
        }
      }
    }
  }
  return {deck, mu};
}

function computeDecks(deck, mu){
  const total = Object.values(deck).reduce((a,d)=>a+d.games,0);
  const decks = Object.entries(deck).map(([label,v])=>{
    const wr = v.games ? v.wins/v.games : 0;
    const [lo,hi] = wilson(v.wins, v.games);
    return { label, games:v.games, wins:v.wins, wr, ciLo:lo, ciHi:hi,
             play: total ? v.games/total : 0 };
  });
  const playOf = {}; decks.forEach(d=>playOf[d.label]=d.play);
  // WRmeta: WR jen proti soupeřům s playrate >= META_MIN
  decks.forEach(d=>{
    let g=0,w=0;
    for(const [k,v] of Object.entries(mu)){
      const i=k.indexOf('@@'); if(k.slice(0,i)!==d.label) continue;
      const opp=k.slice(i+2);
      if((playOf[opp]||0) >= META_MIN){ g+=v.games; w+=v.wins; }
    }
    d.wrMetaGames=g; d.wrMeta = g ? w/g : null;
  });
  return { decks, total };
}

function fmtWR(wr){ return wr==null ? '—' : (wr*100).toFixed(0)+'%'; }
function fmtCI(lo,hi){ return `${(lo*100).toFixed(0)}–${(hi*100).toFixed(0)}`; }

function render(){
  const {deck, mu} = aggregate();
  const {decks, total} = computeDecks(deck, mu);
  const root = document.getElementById('content');

  if(total === 0){
    state.selected = null;
    root.innerHTML = `<div class="empty-state"><b>No games here yet</b>
      Nothing collected for this region/format/window. ${state.region!=='all'?'This region may still be filling up.':'Try a wider window.'}</div>`;
    return;
  }
  const byLabel = Object.fromEntries(decks.map(d=>[d.label,d]));
  const maxPlay = Math.max(...decks.map(d=>d.play), 1e-6);

  // sort
  const sorted = decks.slice().sort((a,b)=>
    state.sort==='win' ? (b.wr-a.wr || b.games-a.games) : (b.games-a.games));

  // ---- deck detail ----
  let detailHtml = '';
  if(state.selected && byLabel[state.selected]){
    const d = byLabel[state.selected];
    const rows = Object.entries(mu)
      .filter(([k])=>k.startsWith(state.selected+'@@'))
      .map(([k,v])=>{ const opp=k.slice(k.indexOf('@@')+2); const [lo,hi]=wilson(v.wins,v.games);
        return {opp, games:v.games, wins:v.wins, wr:v.wins/v.games, lo, hi, play:byLabel[opp]?byLabel[opp].play:0}; })
      .sort((a,b)=>b.play-a.play || b.games-a.games);
    detailHtml = `<div class="detail">
      <div class="dhead">
        <div class="dtitle">${chips(d.label)} ${deckName(d.label)}</div>
        <button class="close" onclick="clearSel()" aria-label="Close">✕</button>
      </div>
      <div class="stat">
        <div><span class="k">Games</span><b>${d.games}</b></div>
        <div><span class="k">Play rate</span><b>${(d.play*100).toFixed(1)}%</b></div>
        <div><span class="k">Win rate</span><b style="color:${wrColor(d.wr)}">${fmtWR(d.wr)}</b><span class="ci">95% CI ${fmtCI(d.ciLo,d.ciHi)}</span></div>
        <div><span class="k">WR vs meta</span><b>${fmtWR(d.wrMeta)}</b><span class="ci">${d.wrMetaGames} games</span></div>
      </div>
      <div class="mlist">${
        rows.length ? rows.map(r=>`<div class="mrow">
          <div class="opp">${chips(r.opp)}<span>${deckName(r.opp)}</span></div>
          <div class="rec">${r.wins}/${r.games}</div>
          <div class="wrcell" style="color:${wrColor(r.wr)}">${fmtWR(r.wr)}</div>
          <div class="ci">${fmtCI(r.lo,r.hi)}</div>
        </div>`).join('') : '<div style="padding:16px 0;color:var(--faint)">No recorded matchups yet.</div>'}
      </div>
      <div style="margin-top:12px;font:500 11px/1.5 'Spline Sans Mono',monospace;color:var(--faint)">
        Matchups ordered by opponent play rate · win % is this deck vs that opponent</div>
    </div>`;
  }

  // ---- meta table ----
  const arrow = k => state.sort===k ? ' ↓' : '';
  const metaTable = `<div class="scroll"><table class="list"><thead><tr>
      <th>Archetype</th>
      <th class="num sortable ${state.sort==='play'?'active':''}" onclick="setSort('play')">Play${arrow('play')}</th>
      <th class="num">Games</th>
      <th class="num sortable ${state.sort==='win'?'active':''}" onclick="setSort('win')">Win${arrow('win')}</th>
      <th class="num">95% CI</th>
      <th class="num">WR vs meta</th>
    </tr></thead><tbody>`+
    sorted.map(d=>`<tr class="${d.label===state.selected?'sel':''}" onclick="selDeck('${d.label.replace(/'/g,"\\'")}')">
      <td><div class="nm">${chips(d.label)}<span>${deckName(d.label)}</span></div></td>
      <td class="num">${(d.play*100).toFixed(1)}%<div class="pbar"><i style="width:${(d.play/maxPlay*100).toFixed(0)}%"></i></div></td>
      <td class="num" style="color:var(--muted)">${d.games}</td>
      <td class="num" style="color:${d.games>=MIN_GAMES?wrColor(d.wr):'var(--faint)'}">${fmtWR(d.wr)}</td>
      <td class="num ci">${fmtCI(d.ciLo,d.ciHi)}</td>
      <td class="num" style="color:${d.wrMeta!=null?wrColor(d.wrMeta):'var(--faint)'}">${fmtWR(d.wrMeta)}</td>
    </tr>`).join('')+`</tbody></table></div>`;

  // ---- matchup matrix ----
  const top = decks.filter(d=>d.games>=MIN_GAMES).sort((a,b)=>b.games-a.games).slice(0,12);
  let mxHtml;
  if(top.length<2){
    mxHtml = `<div class="empty-state">Not enough decks with ${MIN_GAMES}+ games yet to build a matrix.</div>`;
  } else {
    const cell = (r,c)=>{
      if(r.label===c.label) return `<td class="diag">—</td>`;
      const e = mu[`${r.label}@@${c.label}`];
      if(!e || !e.games) return `<td class="empty">·</td>`;
      const wr=e.wins/e.games, [lo,hi]=wilson(e.wins,e.games), low=e.games<3?' low':'';
      return `<td class="${low.trim()}" style="background:${wrColor(wr)}" title="${deckName(r.label)} vs ${deckName(c.label)} — ${e.wins}/${e.games} · ${(wr*100).toFixed(0)}% (${fmtCI(lo,hi)})">${(wr*100).toFixed(0)}</td>`;
    };
    mxHtml = `<div class="scroll"><table class="mx"><thead><tr>
        <th></th><th class="lead">N</th><th class="lead">WR<br>meta</th>`+
      top.map(c=>`<th><div class="v" title="${c.label}" onclick="selDeck('${c.label.replace(/'/g,"\\'")}')">${deckName(c.label)}</div></th>`).join('')+
      `</tr></thead><tbody>`+
      top.map(r=>`<tr>
        <th title="${r.label}" onclick="selDeck('${r.label.replace(/'/g,"\\'")}')">${deckName(r.label)}</th>
        <td class="lead">${r.games}</td>
        <td class="lead" style="color:${r.wrMeta!=null?wrColor(r.wrMeta):'var(--faint)'}">${fmtWR(r.wrMeta)}</td>`+
        top.map(c=>cell(r,c)).join('')+`</tr>`).join('')+
      `</tbody></table></div>
      <div class="legend"><span>Unfavored</span>
        <span class="scale"><i style="background:${wrColor(.35)}"></i><i style="background:${wrColor(.5)}"></i><i style="background:${wrColor(.65)}"></i></span>
        <span>Favored · cell = row's win% vs column · faded = under 3 games · hover for sample + CI</span></div>`;
  }

  root.innerHTML = detailHtml + `
    <section><div class="head"><h2>Meta</h2>
      <span class="note">${decks.length} archetypes · ${total} deck appearances · click a deck for matchups</span>
      <span class="spacer"></span>
      <button class="linkbtn" onclick="downloadCSV()">Download CSV</button></div>${metaTable}</section>
    <section><div class="head"><h2>Matchup matrix</h2>
      <span class="note">top ${Math.min(12,top.length)} by play rate</span></div>${mxHtml}</section>`;
}

// ---- interakce ----
window.setSort = k => { state.sort=k; render(); };
window.selDeck = label => { state.selected = (state.selected===label?null:label); render();
  if(state.selected) document.querySelector('.detail')?.scrollIntoView({behavior:'smooth',block:'nearest'}); };
window.clearSel = () => { state.selected=null; render(); };
window.downloadCSV = () => {
  const {deck,mu}=aggregate(); const {decks}=computeDecks(deck,mu);
  const rows=[['archetype','games','play_rate','win_rate','ci_low','ci_high','wr_vs_meta','wr_meta_games']];
  decks.sort((a,b)=>b.games-a.games).forEach(d=>rows.push([
    deckName(d.label)+' '+regionsOf(d.label).join('/'), d.games,
    (d.play*100).toFixed(2), (d.wr*100).toFixed(1), (d.ciLo*100).toFixed(1), (d.ciHi*100).toFixed(1),
    d.wrMeta!=null?(d.wrMeta*100).toFixed(1):'', d.wrMetaGames]));
  const csv=rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=`lnd-meta-${state.region}-${state.format}-${state.window||'patch'}d.csv`; a.click();
  URL.revokeObjectURL(a.href);
};

function buildSeg(id, opts, key){
  const el = document.getElementById(id);
  el.innerHTML = opts.map(o=>`<button data-v="${o.v}" aria-pressed="${state[key]==o.v}">${o.t}</button>`).join('');
  el.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    let v=b.dataset.v; if(key==='window') v = v==='patch'?null:Number(v);
    state[key]=v; state.selected=null;
    el.querySelectorAll('button').forEach(x=>x.setAttribute('aria-pressed', x===b));
    render();
  });
}

function init(){
  let totalGames=0;
  for(const d of Object.keys(STATS.days||{})) for(const r of Object.values(STATS.days[d]))
    for(const f of Object.values(r)) totalGames += Object.values(f.deckGames||{}).reduce((a,b)=>a+b.games,0);
  const upd = STATS.generatedAt ? new Date(STATS.generatedAt) : null;
  document.getElementById('meta').innerHTML =
    `<span>Patch <b>${STATS.patchStart||'—'}</b></span><span class="dot">/</span>
     <span><b>${Math.round(totalGames/2)}</b> matches</span><span class="dot">/</span>
     <span>updated <b>${upd?upd.toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'—'}</b></span>`;

  const regions = STATS.regions || ['europe','americas','asia'];
  buildSeg('seg-region', [{v:'all',t:'All'}, ...regions.map(r=>({v:r,t:REGION_LABEL[r]||r}))], 'region');
  buildSeg('seg-format', [{v:'all',t:'All'},{v:'standard',t:'Standard'},{v:'eternal',t:'Eternal'}], 'format');
  buildSeg('seg-window', [{v:'2',t:'2d'},{v:'7',t:'7d'},{v:'14',t:'14d'},{v:'patch',t:'Patch'}], 'window');

  document.getElementById('foot').innerHTML =
    'Data crawled from the Riot LoR API, grouped by champions + regions. '+
    '<b>WR vs meta</b> is win rate counting only opponents with ≥1% play rate (ignores fringe decks). '+
    '<b>95% CI</b> is the Wilson interval — with small samples the true win rate sits anywhere in that range, so read low-game decks with care.';
  render();
}

fetch('./data/stats.json', {cache:'no-store'})
  .then(r=>r.json())
  .then(d=>{ STATS=d; init(); })
  .catch(e=>{ document.getElementById('content').innerHTML =
    `<div class="empty-state"><b>Couldn't load stats.json</b>${e}</div>`; });
</script>
