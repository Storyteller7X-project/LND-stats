name: collect

on:
  schedule:
    - cron: '*/10 * * * *'   # každých 10 min (GitHub může lehce zpozdit)
  workflow_dispatch:          # ruční spuštění z Actions záložky

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false   # nech doběhnout, nepřekrývej běhy

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run collector
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SECRET }}
        run: node collect.mjs

      - name: Commit stats
        run: |
          git config user.name "lor-meta-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/stats.json
          if git diff --cached --quiet; then
            echo "Žádná změna ve stats.json"
          else
            git commit -m "data: update stats [skip ci]"
            git push
          fi
