name: collect

on:
  schedule:
    - cron: '0 */6 * * *'     # každých 6 hodin spustí jeden dlouhý běh
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false   # nepřekrývat běhy

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 350        # pod stropem 360 min
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect loop
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
          FIREBASE_SECRET: ${{ secrets.FIREBASE_SECRET }}
        run: |
          git config user.name "lor-meta-bot"
          git config user.email "actions@users.noreply.github.com"
          END=$((SECONDS + 19800))   # ~5,5 hodiny smyckovat
          ITER=0
          while [ $SECONDS -lt $END ]; do
            ITER=$((ITER+1))
            echo "===== iterace $ITER ($(date -u +%H:%M:%S) UTC) ====="
            node collect.mjs || echo "collect skoncil chybou, pokracuju"
            git add data/stats.json
            if ! git diff --cached --quiet; then
              git commit -m "data: update stats [skip ci]"
              git push || (git pull --rebase && git push) || echo "push selhal, zkusim pristi"
            else
              echo "zadna nova data, necommituju"
            fi
            # neprekroc Riot 100/hod: ~6 iteraci za hodinu
            sleep 600
          done
          echo "smycka dokoncena po $ITER iteracich"
